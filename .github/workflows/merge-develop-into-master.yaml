name: Merge Develop into Master

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Name of the release'
        required: true
      major_deployment:
        description: 'Type yes if the deployment is major'
        required: true
        default: 'no' 

permissions:
  contents: write

jobs:
  merge-develop-to-master:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout develop branch
      uses: actions/checkout@v3
      with:
        ref: develop
        fetch-depth: 0

    - name: Get latest tag and bump patch
      id: version
      run: |
        major_deployment="${{ github.event.inputs.major_deployment }}"

        FILE='README1.md'


        CURRENT_VERSION=$(grep "Release Version" $FILE | awk -F'"' '{print $2}')

        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

        # Condition (example)
        if [ "$major_deployment" = "yes" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
        else
            PATCH=$((PATCH + 1))
        fi

        NEW_VERSION="$MAJOR.$MINOR.$PATCH"

        sed -i "s/# Release Version : \"$CURRENT_VERSION\"/# Release Version : \"$NEW_VERSION\"/g" $FILE


    - name: Commit and push changes to master
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        git add README.md
        git commit -m "chore: bump version to $VERSION" for ${{github.event.inputs.release}} || echo "No changes to commit"
        git push origin develop

    - name: Checkout master branch
      uses: actions/checkout@v3
      with:
        ref: master
        fetch-depth: 0

    - name: Merge develop into master
      run: |
        git merge origin/develop
        git push origin master
