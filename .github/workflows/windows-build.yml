name: Windows Build

on:
  push:
    branches: [ main, develop,voip ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qtwebsockets'
          cache: true
      
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'a42af01b72c28a8e1d7b48107b33e4f286a55ef6'
      
      - name: Install dependencies via vcpkg
        run: |
          $env:VCPKG_ROOT = "${{ github.workspace }}\vcpkg"
          cd $env:VCPKG_ROOT
          .\vcpkg install pjproject:x64-windows
          .\vcpkg install openssl:x64-windows
          .\vcpkg integrate install
          Write-Host "VCPKG_ROOT: $env:VCPKG_ROOT"
          Write-Host "Checking installed packages:"
          .\vcpkg list
          Write-Host "Checking pjsua2.hpp location:"
          Get-ChildItem -Path "installed\x64-windows\include" -Recurse -Filter "pjsua2.hpp" -ErrorAction SilentlyContinue
        shell: powershell
      
      - name: Configure project
        run: |
          set VCPKG_ROOT=${{ github.workspace }}\vcpkg
          qmake SIPConnectivityTester.pro -spec win32-g++ "CONFIG+=release"
        shell: cmd
      
      - name: Build application
        run: |
          mingw32-make -j4
        shell: cmd
      
      - name: Deploy Qt dependencies
        run: |
          cd release
          windeployqt --release --no-translations SIPConnectivityTester.exe
        shell: cmd
      
      - name: Copy additional DLLs
        run: |
          # Copy PJSIP and OpenSSL DLLs from vcpkg
          Copy-Item "$env:VCPKG_ROOT\installed\x64-windows\bin\*.dll" -Destination "release\" -ErrorAction SilentlyContinue
        shell: powershell
      
      - name: Create portable package
        run: |
          mkdir SIPConnectivityTester-Windows
          xcopy /E /I release SIPConnectivityTester-Windows
          7z a SIPConnectivityTester-Windows-Portable.zip SIPConnectivityTester-Windows
        shell: cmd
      
      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix
          wix extension add WixToolset.UI.wixext
        shell: powershell
      
      - name: Create WiX installer configuration
        run: |
          $wxs = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package Name="SIP Connectivity Tester" 
                     Manufacturer="Eltropy" 
                     Version="1.0.0.0"
                     UpgradeCode="12345678-1234-1234-1234-123456789012">
              
              <MajorUpgrade DowngradeErrorMessage="A newer version is already installed." />
              
              <Feature Id="MainFeature" Title="SIP Connectivity Tester" Level="1">
                <ComponentGroupRef Id="ProductComponents" />
              </Feature>
              
              <StandardDirectory Id="ProgramFiles6432Folder">
                <Directory Id="INSTALLFOLDER" Name="SIPConnectivityTester" />
              </StandardDirectory>
            </Package>
            
            <Fragment>
              <ComponentGroup Id="ProductComponents" Directory="INSTALLFOLDER">
                <Component Id="MainExecutable">
                  <File Source="release\SIPConnectivityTester.exe" />
                </Component>
              </ComponentGroup>
            </Fragment>
          </Wix>
          "@
          Set-Content -Path "installer.wxs" -Value $wxs
        shell: powershell
      
      - name: Build MSI installer
        run: |
          wix build installer.wxs -o SIPConnectivityTester-Setup.msi
        shell: cmd
        continue-on-error: true
      
      - name: Upload portable package
        uses: actions/upload-artifact@v4
        with:
          name: SIPConnectivityTester-Windows-Portable
          path: SIPConnectivityTester-Windows-Portable.zip
      
      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SIPConnectivityTester-Windows-MSI
          path: SIPConnectivityTester-Setup.msi
      
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            SIPConnectivityTester-Windows-Portable.zip
            SIPConnectivityTester-Setup.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
