name: Windows Build

on:
  push:
    branches: [ main, develop, voip ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Setup MSVC
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Install Qt
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtwebsockets'
          cache: true

      # Setup vcpkg with binary caching
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'a42af01b72c28a8e1d7b48107b33e4f286a55ef6'
          
      # Enable vcpkg binary caching to GitHub Actions cache
      - name: Setup vcpkg binary caching
        run: |
          vcpkg version
          echo "VCPKG_BINARY_SOURCES=clear;x-gha,readwrite" >> $GITHUB_ENV
        shell: bash

      # Install OpenSSL via vcpkg (will use binary cache automatically)
      - name: Install OpenSSL
        run: |
          vcpkg install openssl:x64-windows
          vcpkg integrate install
        shell: cmd

      # Cache PJSIP build
      - name: Cache PJSIP
        uses: actions/cache@v3
        id: cache-pjsip
        with:
          path: ${{ github.workspace }}/pjsip-install
          key: ${{ runner.os }}-pjsip-2.14-v1
          restore-keys: |
            ${{ runner.os }}-pjsip-

      # Build PJSIP from source (only if not cached)
      - name: Build PJSIP
        if: steps.cache-pjsip.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/pjsip/pjproject.git
          cd pjproject
          
          REM Create config_site.h manually
          echo #define PJ_CONFIG_MINIMAL_SIZE 1 > pjlib\include\pj\config_site.h
          echo #define PJMEDIA_HAS_VIDEO 1 >> pjlib\include\pj\config_site.h
          echo #define PJMEDIA_HAS_SRTP 1 >> pjlib\include\pj\config_site.h
          
          REM Build PJSIP
          msbuild pjproject-vs14.sln /p:Configuration=Release /p:Platform=x64 /m /p:UseEnv=true
          
          REM Create install directory structure
          if not exist "%GITHUB_WORKSPACE%\pjsip-install" mkdir "%GITHUB_WORKSPACE%\pjsip-install"
          if not exist "%GITHUB_WORKSPACE%\pjsip-install\include" mkdir "%GITHUB_WORKSPACE%\pjsip-install\include"
          if not exist "%GITHUB_WORKSPACE%\pjsip-install\lib" mkdir "%GITHUB_WORKSPACE%\pjsip-install\lib"
          
          REM Copy headers
          echo Copying headers...
          xcopy /E /I /Y pjlib\include\* "%GITHUB_WORKSPACE%\pjsip-install\include\"
          xcopy /E /I /Y pjlib-util\include\* "%GITHUB_WORKSPACE%\pjsip-install\include\"
          xcopy /E /I /Y pjnath\include\* "%GITHUB_WORKSPACE%\pjsip-install\include\"
          xcopy /E /I /Y pjmedia\include\* "%GITHUB_WORKSPACE%\pjsip-install\include\"
          xcopy /E /I /Y pjsip\include\* "%GITHUB_WORKSPACE%\pjsip-install\include\"
          
          REM Find and copy libraries from build output
          echo Copying libraries...
          echo Searching for all .lib files...
          dir /s /b *.lib
          
          REM Copy from common build output directories
          if exist "lib\*.lib" (
            echo Copying from lib directory...
            copy /Y "lib\*.lib" "%GITHUB_WORKSPACE%\pjsip-install\lib\"
          )
          
          if exist "pjlib\lib\*.lib" (
            echo Copying from pjlib\lib...
            copy /Y "pjlib\lib\*.lib" "%GITHUB_WORKSPACE%\pjsip-install\lib\"
          )
          
          if exist "pjsip\lib\*.lib" (
            echo Copying from pjsip\lib...
            copy /Y "pjsip\lib\*.lib" "%GITHUB_WORKSPACE%\pjsip-install\lib\"
          )
          
          REM Recursively find and copy all .lib files as fallback
          echo Copying all .lib files recursively...
          for /r %%i in (*.lib) do (
            echo Found: %%i
            copy /Y "%%i" "%GITHUB_WORKSPACE%\pjsip-install\lib\" 2>nul
          )
          
          REM Verify installation
          echo Verifying PJSIP installation...
          dir "%GITHUB_WORKSPACE%\pjsip-install\include"
          dir "%GITHUB_WORKSPACE%\pjsip-install\lib"
          
        shell: cmd
        continue-on-error: false

      # Verify PJSIP cache
      - name: Verify PJSIP Installation
        run: |
          echo Checking PJSIP installation...
          dir %GITHUB_WORKSPACE%\pjsip-install\include
          echo.
          echo Library files:
          dir /B %GITHUB_WORKSPACE%\pjsip-install\lib\*.lib
          echo.
          echo Full library listing:
          dir %GITHUB_WORKSPACE%\pjsip-install\lib
        shell: cmd

      # Configure Project with CMake
      - name: Configure Project
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release --debug-output
        env:
          PJSIP_ROOT: ${{ github.workspace }}\pjsip-install
        shell: cmd

      # Build with CMake
      - name: Build
        run: |
          cd build
          cmake --build . --config Release
        shell: cmd

      # Deploy Qt
      - name: Deploy Qt
        run: |
          cd build\Release
          windeployqt --release --no-translations SIPConnectivityTester.exe
        shell: cmd

      # Install OpenSSL for TLS support
      - name: Install OpenSSL
        run: |
          choco install openssl -y
          echo OpenSSL installed
        shell: cmd

      # Copy OpenSSL DLLs for TLS support
      - name: Copy OpenSSL DLLs
        run: |
          echo Copying OpenSSL DLLs for TLS support...
          if exist "C:\Program Files\OpenSSL\bin\libssl-3-x64.dll" (
            copy "C:\Program Files\OpenSSL\bin\libssl-3-x64.dll" "build\Release\"
            copy "C:\Program Files\OpenSSL\bin\libcrypto-3-x64.dll" "build\Release\"
            echo OpenSSL 3.x DLLs copied
          ) else if exist "C:\Program Files\OpenSSL-Win64\bin\libssl-1_1-x64.dll" (
            copy "C:\Program Files\OpenSSL-Win64\bin\libssl-1_1-x64.dll" "build\Release\"
            copy "C:\Program Files\OpenSSL-Win64\bin\libcrypto-1_1-x64.dll" "build\Release\"
            echo OpenSSL 1.1.x DLLs copied
          ) else (
            echo WARNING: OpenSSL DLLs not found - TLS connectivity may not work
            dir "C:\Program Files\OpenSSL*" /s /b
          )
        shell: cmd

      # Copy DLLs (optional - may not be needed if statically linked)
      - name: Copy DLLs
        run: |
          if exist "%GITHUB_WORKSPACE%\vcpkg\installed\x64-windows\bin\*.dll" (
            xcopy /Y "%GITHUB_WORKSPACE%\vcpkg\installed\x64-windows\bin\*.dll" "build\Release\"
          ) else (
            echo No vcpkg DLLs found - likely statically linked
          )
        shell: cmd
        continue-on-error: true

      # Verify build output
      - name: Verify Build Output
        run: |
          echo Checking for SIPConnectivityTester.exe...
          if exist "build\Release\SIPConnectivityTester.exe" (
            echo SUCCESS: SIPConnectivityTester.exe was built successfully
            dir "build\Release\SIPConnectivityTester.exe"
          ) else (
            echo ERROR: SIPConnectivityTester.exe not found!
            exit 1
          )
        shell: cmd

      # Create Portable Package
      - name: Create Portable Package
        run: |
          mkdir SIPConnectivityTester-Portable
          xcopy /E /I /Y build\Release SIPConnectivityTester-Portable
          powershell Compress-Archive -Path SIPConnectivityTester-Portable -DestinationPath SIPConnectivityTester-Windows-Portable.zip
        shell: cmd

      # Install WiX v4 (no EULA required)
      - name: Install WiX
        run: |
          dotnet tool install --global wix --version 4.0.5
        shell: powershell

      # Harvest files for installer
      - name: Harvest Files
        run: |
          echo Harvesting files from build\Release...
          wix extension add WixToolset.Heat.Extension
          wix build -ext WixToolset.Heat.Extension -define HarvestPath=build\Release -out files.wixobj -src files.wxs
        shell: powershell
        continue-on-error: true

      # Create Installer using manual file listing
      - name: Create Installer
        run: |
          # Create main WXS file
          $wxs = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package Name="SIP Connectivity Tester"
                     Manufacturer="Eltropy"
                     Version="1.0.0.0"
                     UpgradeCode="12345678-1234-1234-1234-123456789012">

              <MajorUpgrade DowngradeErrorMessage="A newer version is already installed." />

              <Feature Id="MainFeature" Title="SIP Connectivity Tester" Level="1">
                <ComponentGroupRef Id="ProductComponents" />
              </Feature>

              <StandardDirectory Id="ProgramFiles64Folder">
                <Directory Id="INSTALLFOLDER" Name="SIPConnectivityTester" />
              </StandardDirectory>
            </Package>

            <Fragment>
              <ComponentGroup Id="ProductComponents" Directory="INSTALLFOLDER">
          "@

          # Add all files from build\Release directory
          $files = Get-ChildItem -Path "build\Release" -File
          $componentId = 1
          foreach ($file in $files) {
            $wxs += @"

                <Component Id="Component$componentId" Guid="*">
                  <File Source="build\Release\$($file.Name)" />
                </Component>
          "@
            $componentId++
          }

          $wxs += @"

              </ComponentGroup>
            </Fragment>
          </Wix>
          "@

          Set-Content -Path "installer.wxs" -Value $wxs
          
          # Show the generated WXS for debugging
          echo "Generated installer.wxs:"
          Get-Content installer.wxs

        shell: powershell

      # Build MSI
      - name: Build MSI
        run: |
          wix build installer.wxs -out SIPConnectivityTester-Setup.msi
          if exist "SIPConnectivityTester-Setup.msi" (
            echo MSI created successfully
            dir SIPConnectivityTester-Setup.msi
          ) else (
            echo ERROR: MSI was not created
            exit 1
          )
        shell: cmd

      # Upload Portable
      - name: Upload Portable
        uses: actions/upload-artifact@v4
        with:
          name: SIPConnectivityTester-Windows-Portable
          path: SIPConnectivityTester-Windows-Portable.zip

      # Upload MSI
      - name: Upload MSI
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SIPConnectivityTester-Windows-MSI
          path: SIPConnectivityTester-Setup.msi