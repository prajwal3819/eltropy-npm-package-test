name: Windows Build

on:
  push:
    branches: [ main, develop, voip ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Setup MSVC
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Install Qt
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtwebsockets'
          cache: true

      # Cache vcpkg packages
      - name: Cache vcpkg
        uses: actions/cache@v3
        id: cache-vcpkg
        with:
          path: |
            ${{ github.workspace }}/vcpkg/installed
            ${{ github.workspace }}/vcpkg/packages
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/vcpkg.json') }}-v1
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      # Setup vcpkg
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'a42af01b72c28a8e1d7b48107b33e4f286a55ef6'

      # Install OpenSSL via vcpkg
      - name: Install OpenSSL
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          vcpkg install openssl:x64-windows
          vcpkg integrate install
        shell: cmd

      # Integrate vcpkg if cached
      - name: Integrate vcpkg (cached)
        if: steps.cache-vcpkg.outputs.cache-hit == 'true'
        run: vcpkg integrate install
        shell: cmd

      # Cache PJSIP build
      - name: Cache PJSIP
        uses: actions/cache@v3
        id: cache-pjsip
        with:
          path: ${{ github.workspace }}/pjsip-install
          key: ${{ runner.os }}-pjsip-2.14-v1
          restore-keys: |
            ${{ runner.os }}-pjsip-

      # Build PJSIP from source (only if not cached)
      - name: Build PJSIP
        if: steps.cache-pjsip.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/pjsip/pjproject.git
          cd pjproject
          
          REM Create config_site.h manually
          echo #define PJ_CONFIG_MINIMAL_SIZE 1 > pjlib\include\pj\config_site.h
          echo #define PJMEDIA_HAS_VIDEO 1 >> pjlib\include\pj\config_site.h
          echo #define PJMEDIA_HAS_SRTP 1 >> pjlib\include\pj\config_site.h
          
          REM Build PJSIP
          msbuild pjproject-vs14.sln /p:Configuration=Release /p:Platform=x64 /m /p:UseEnv=true
          
          REM Create install directory structure
          if not exist "%GITHUB_WORKSPACE%\pjsip-install" mkdir "%GITHUB_WORKSPACE%\pjsip-install"
          if not exist "%GITHUB_WORKSPACE%\pjsip-install\include" mkdir "%GITHUB_WORKSPACE%\pjsip-install\include"
          if not exist "%GITHUB_WORKSPACE%\pjsip-install\lib" mkdir "%GITHUB_WORKSPACE%\pjsip-install\lib"
          
          REM Copy headers
          echo Copying headers...
          xcopy /E /I /Y pjlib\include\* "%GITHUB_WORKSPACE%\pjsip-install\include\"
          xcopy /E /I /Y pjlib-util\include\* "%GITHUB_WORKSPACE%\pjsip-install\include\"
          xcopy /E /I /Y pjnath\include\* "%GITHUB_WORKSPACE%\pjsip-install\include\"
          xcopy /E /I /Y pjmedia\include\* "%GITHUB_WORKSPACE%\pjsip-install\include\"
          xcopy /E /I /Y pjsip\include\* "%GITHUB_WORKSPACE%\pjsip-install\include\"
          
          REM Find and copy libraries from build output
          echo Copying libraries...
          if exist "lib\*.lib" (
            copy /Y "lib\*.lib" "%GITHUB_WORKSPACE%\pjsip-install\lib\"
          ) else (
            echo Searching for lib files in alternative locations...
            for /r %%i in (*.lib) do copy /Y "%%i" "%GITHUB_WORKSPACE%\pjsip-install\lib\"
          )
          
          REM Verify installation
          echo Verifying PJSIP installation...
          dir "%GITHUB_WORKSPACE%\pjsip-install\include"
          dir "%GITHUB_WORKSPACE%\pjsip-install\lib"
          
        shell: cmd
        continue-on-error: false

      # Verify PJSIP cache
      - name: Verify PJSIP Installation
        run: |
          echo Checking PJSIP installation...
          dir %GITHUB_WORKSPACE%\pjsip-install\include
          dir %GITHUB_WORKSPACE%\pjsip-install\lib
        shell: cmd

      # Configure Project
      - name: Configure Project
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set VCPKG_ROOT=%GITHUB_WORKSPACE%\vcpkg
          set PJSIP_ROOT=%GITHUB_WORKSPACE%\pjsip-install
          qmake SIPConnectivityTester.pro -spec win32-msvc "CONFIG+=release"
        shell: cmd

      # Build
      - name: Build
        run: |
          nmake release
        shell: cmd

      # Deploy Qt
      - name: Deploy Qt
        run: |
          cd release
          windeployqt --release --no-translations SIPConnectivityTester.exe
        shell: cmd

      # Copy DLLs
      - name: Copy DLLs
        run: |
          copy %GITHUB_WORKSPACE%\vcpkg\installed\x64-windows\bin\*.dll release\
        shell: cmd

      # Create Portable Zip
      - name: Create Portable
        run: |
          mkdir SIPConnectivityTester-Windows
          xcopy /E /I release SIPConnectivityTester-Windows
          7z a SIPConnectivityTester-Windows-Portable.zip SIPConnectivityTester-Windows
        shell: cmd

      # Install WiX
      - name: Install WiX
        run: |
          dotnet tool install --global wix
          wix extension add WixToolset.UI.wixext
        shell: powershell

      # Create Installer
      - name: Create Installer
        run: |
          $wxs = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package Name="SIP Connectivity Tester"
                     Manufacturer="Eltropy"
                     Version="1.0.0.0"
                     UpgradeCode="12345678-1234-1234-1234-123456789012">

              <MajorUpgrade DowngradeErrorMessage="A newer version is already installed." />

              <Feature Id="MainFeature" Title="SIP Connectivity Tester" Level="1">
                <ComponentGroupRef Id="ProductComponents" />
              </Feature>

              <StandardDirectory Id="ProgramFiles6432Folder">
                <Directory Id="INSTALLFOLDER" Name="SIPConnectivityTester" />
              </StandardDirectory>
            </Package>

            <Fragment>
              <ComponentGroup Id="ProductComponents" Directory="INSTALLFOLDER">
                <Component Id="MainExecutable" Guid="*">
                  <File Source="release\SIPConnectivityTester.exe" />
                </Component>
              </ComponentGroup>
            </Fragment>
          </Wix>
          "@

          Set-Content -Path "installer.wxs" -Value $wxs

        shell: powershell

      # Build MSI
      - name: Build MSI
        run: |
          wix build installer.wxs -o SIPConnectivityTester-Setup.msi
        shell: cmd
        continue-on-error: true

      # Upload Portable
      - name: Upload Portable
        uses: actions/upload-artifact@v4
        with:
          name: SIPConnectivityTester-Windows-Portable
          path: SIPConnectivityTester-Windows-Portable.zip

      # Upload MSI
      - name: Upload MSI
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SIPConnectivityTester-Windows-MSI
          path: SIPConnectivityTester-Setup.msi